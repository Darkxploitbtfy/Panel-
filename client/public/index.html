<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Client Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --muted:     #2a2a3a;
      --text:      #e2e2f0;
      --sub:       #7a7a9a;
      --green:     #22c55e;
      --yellow:    #f59e0b;
      --red:       #ef4444;
      --blue:      #3b82f6;
      --accent:    #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span {
      font-size: 12px;
      color: var(--sub);
      display: block;
      margin-top: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
    }

    .session-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .session-form label {
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    .btn-load {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-load:hover { opacity: 0.85; }
    .btn-load:disabled { opacity: 0.4; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 24px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--sub);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.connecting   { background: var(--yellow); animation: pulse 1.2s infinite; }
    .status-dot.reconnecting { background: var(--yellow); animation: pulse 1.2s infinite; }
    .status-dot.awaiting_qr  { background: var(--blue); animation: pulse 1.2s infinite; }
    .status-dot.error        { background: var(--red); }
    .status-dot.stopped      { background: var(--sub); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .status-text {
      font-size: 13px;
      color: var(--sub);
      flex: 1;
    }

    .status-text strong {
      color: var(--text);
      font-weight: 500;
    }

    .wa-name {
      font-size: 12px;
      color: var(--sub);
      text-align: right;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 18px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
      user-select: none;
    }

    .btn:hover:not(:disabled) {
      background: var(--muted);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    .btn-start  { border-color: #1a3a2a; }
    .btn-start:hover:not(:disabled) { border-color: var(--green); background: #0d1f14; }

    .btn-restart { border-color: #2a2a1a; }
    .btn-restart:hover:not(:disabled) { border-color: var(--yellow); background: #1f1f0d; }

    .btn-kill   { border-color: #3a1a1a; }
    .btn-kill:hover:not(:disabled)   { border-color: var(--red); background: #1f0d0d; }

    .msg {
      margin-top: 18px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }

    .msg.ok    { color: var(--green); }
    .msg.err   { color: var(--red); }
    .msg.info  { color: var(--blue); }

    .panel-hidden { display: none; }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Bot Client Panel</h1>
      <span>Isolated Runtime Manager</span>
    </div>
  </div>

  <div class="card">
    <div class="session-form">
      <label>Session ID</label>
      <div class="input-row">
        <input type="text" id="sessionIdInput" placeholder="Enter your session ID..." />
        <button class="btn-load" id="loadBtn" onclick="loadSession()">Load</button>
      </div>
    </div>

    <div id="panel" class="panel-hidden">
      <div class="divider"></div>

      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text">
          Status: <strong id="statusLabel">—</strong>
        </div>
        <div class="wa-name" id="waName"></div>
      </div>

      <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="action('start')">
          <span class="icon">▶</span>
          Start
        </button>
        <button class="btn btn-restart" id="btnRestart" onclick="action('restart')">
          <span class="icon">↺</span>
          Restart
        </button>
        <button class="btn btn-kill" id="btnKill" onclick="action('kill')">
          <span class="icon">■</span>
          Kill
        </button>
      </div>

      <div class="msg" id="msgBox"></div>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let eventSource = null;

    function showMsg(text, type = '') {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = 'msg ' + type;
      if (text) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 5000);
    }

    function applyStatus(status, name) {
      const dot = document.getElementById('statusDot');
      const label = document.getElementById('statusLabel');
      const waName = document.getElementById('waName');
      const btnStart = document.getElementById('btnStart');
      const btnRestart = document.getElementById('btnRestart');
      const btnKill = document.getElementById('btnKill');

      dot.className = 'status-dot ' + (status || 'stopped');

      const labels = {
        stopped: 'Stopped',
        connecting: 'Connecting…',
        connected: 'Connected',
        reconnecting: 'Reconnecting…',
        awaiting_qr: 'Awaiting QR scan',
        error: 'Error',
      };
      label.textContent = labels[status] || status || 'Unknown';

      waName.textContent = name ? `@${name}` : '';

      const active = status === 'connected' || status === 'connecting' || status === 'reconnecting';
      btnStart.disabled = active;
      btnRestart.disabled = !active && status !== 'stopped' && status !== 'error';
      btnKill.disabled = !active;
    }

    async function loadSession() {
      const val = document.getElementById('sessionIdInput').value.trim();
      if (!val) { showMsg('Please enter a session ID', 'err'); return; }

      document.getElementById('loadBtn').disabled = true;
      showMsg('Loading session…', 'info');

      try {
        const res = await fetch(`/api/sessions/status/${encodeURIComponent(val)}`);
        if (!res.ok) {
          const data = await res.json();
          showMsg(data.error || 'Session not found', 'err');
          document.getElementById('loadBtn').disabled = false;
          return;
        }
        const data = await res.json();
        currentSessionId = val;
        document.getElementById('panel').classList.remove('panel-hidden');
        applyStatus(data.status, data.whatsappName);
        showMsg('Session loaded', 'ok');
        subscribeToEvents(val);
      } catch (e) {
        showMsg('Network error', 'err');
      }
      document.getElementById('loadBtn').disabled = false;
    }

    function subscribeToEvents(sessionId) {
      if (eventSource) { eventSource.close(); eventSource = null; }
      eventSource = new EventSource(`/api/sessions/events/${encodeURIComponent(sessionId)}`);
      eventSource.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'status') applyStatus(ev.status, ev.name);
          if (ev.type === 'connected') {
            applyStatus('connected', ev.name);
            showMsg('Bot connected to WhatsApp', 'ok');
          }
          if (ev.type === 'disconnected') {
            applyStatus('stopped');
            showMsg('Bot disconnected', 'err');
          }
          if (ev.type === 'reconnecting') {
            applyStatus('reconnecting');
            showMsg('Connection lost — reconnecting…', 'info');
          }
          if (ev.type === 'error') {
            applyStatus('error');
            showMsg('Runtime error: ' + ev.message, 'err');
          }
          if (ev.type === 'qr') {
            applyStatus('awaiting_qr');
            showMsg('QR ready — scan in WhatsApp', 'info');
          }
        } catch (_) {}
      };
      eventSource.onerror = () => {
        setTimeout(() => subscribeToEvents(sessionId), 3000);
      };
    }

    async function action(type) {
      if (!currentSessionId) return;
      const labels = { start: 'Starting…', restart: 'Restarting…', kill: 'Stopping…' };
      showMsg(labels[type] || '…', 'info');

      try {
        const res = await fetch(`/api/sessions/${type}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSessionId }),
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg(data.error || 'Action failed', 'err');
        } else {
          showMsg(data.message || 'Done', 'ok');
        }
      } catch (e) {
        showMsg('Network error', 'err');
      }
    }

    document.getElementById('sessionIdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadSession();
    });
  </script>

</body>
</html>
